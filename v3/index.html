<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Divya Patel · Retention Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,700;10..72,800&family=Atkinson+Hyperlegible:wght@400;700&family=Sometype+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     V3: "RETENTION TIME"
     The career as a chromatogram. Matte graphite instrument
     screen, phosphor amber signal pen, recorder red spec limits.
     Every moment is a peak at its true date; the hero trace is
     the data model and the navigation. Content: ../content.js.
     ============================================================ */

  :root {
    --field: #17191C;
    --panel: #1D2024;
    --rule: #2B2F35;
    --amber: #FFB100;
    --amber-dim: rgba(255, 177, 0, .55);
    --red: #E04A2F;
    --white: #EDEDE8;
    --gray: #9AA0A6;
    --bed: #E9E4D8;        /* scan bed: warm light mat for photos */
    --bed-line: #C9C2B2;
    --display: 'Big Shoulders', 'Big Shoulders Display', 'Arial Narrow', sans-serif;
    --body: 'Atkinson Hyperlegible', system-ui, sans-serif;
    --mono: 'Sometype Mono', ui-monospace, monospace;
    --maxw: 1180px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--body); background: var(--field); color: var(--white); line-height: 1.6;
    -webkit-font-smoothing: antialiased; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 26px; }
  a { color: var(--amber); }
  :focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

  /* graticule ruling over the whole field */
  body::before { content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 64px 64px; opacity: .18; }
  body > * { position: relative; z-index: 1; }

  /* ================= top strip ================= */
  .strip { border-bottom: 1px solid var(--rule); }
  .strip .wrap { display: flex; align-items: center; justify-content: space-between; height: 52px; }
  .strip .id { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gray); }
  .strip .id b { color: var(--amber); font-weight: 600; }
  .strip nav { display: flex; gap: 4px; }
  .strip nav a { font-family: var(--mono); font-size: 11.5px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gray); text-decoration: none; padding: 9px 10px; }
  .strip nav a:hover { color: var(--amber); }

  /* ================= hero: instrument face ================= */
  .hero { padding: 58px 0 0; }
  .hero-grid { display: grid; grid-template-columns: 1fr auto; gap: 44px; align-items: start; }
  h1 { font-family: var(--display); font-weight: 800; font-size: clamp(64px, 11vw, 148px);
    line-height: .88; letter-spacing: .01em; text-transform: uppercase; color: var(--white); }
  h1 .accent { color: var(--amber); }
  .role { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gray); margin-top: 18px; }
  .role b { color: var(--white); font-weight: 500; }
  .lede { max-width: 600px; color: var(--gray); margin-top: 14px; font-size: 16.5px; }
  .plates { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0 0; }
  .plate { cursor: pointer; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--white); background: var(--panel); border: 1px solid var(--rule);
    padding: 9px 14px; transition: border-color .2s, transform .08s; }
  .plate:hover { border-color: var(--amber); color: var(--amber); }
  .plate:active { transform: translateY(2px); }

  /* sample viewport */
  .sample { position: relative; padding: 20px; }
  .sample img, .sample .initials { display: block; width: clamp(150px, 16vw, 210px); height: clamp(150px, 16vw, 210px);
    object-fit: cover; border: 1px solid var(--rule); }
  .sample .initials { display: flex; align-items: center; justify-content: center;
    font-family: var(--display); font-size: 60px; font-weight: 800; color: var(--amber); background: var(--panel); }
  .sample .tick { position: absolute; width: 14px; height: 14px; border: 0 solid var(--amber); }
  .sample .tick.tl { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }
  .sample .tick.tr { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }
  .sample .tick.bl { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }
  .sample .tick.br { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }
  .sample figcaption { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gray); margin-top: 10px; text-align: center; }

  /* ================= the career chromatogram (signature) ================= */
  .chart { margin-top: 46px; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    background: color-mix(in srgb, var(--panel) 55%, transparent); }
  .chart-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
    gap: 10px; padding: 16px 0 4px; }
  .chart-head .t { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--white); }
  .chart-head .t::before { content: "▮ "; color: var(--amber); }
  .channels { display: flex; flex-wrap: wrap; gap: 6px; }
  .ch { cursor: pointer; font-family: var(--mono); font-size: 10.5px; font-weight: 500; letter-spacing: 1px;
    text-transform: uppercase; color: var(--gray); background: var(--panel); border: 1px solid var(--rule);
    padding: 8px 11px; display: inline-flex; gap: 8px; align-items: center;
    transition: color .2s, border-color .2s, transform .08s, box-shadow .08s; box-shadow: 0 2px 0 #0d0e10; }
  .ch:active { transform: translateY(2px); box-shadow: 0 0 0 #0d0e10; }
  .ch .lamp { width: 7px; height: 7px; border-radius: 50%; background: var(--rule); transition: background .2s, box-shadow .2s; }
  .ch.on { color: var(--white); border-color: color-mix(in srgb, var(--amber) 45%, var(--rule)); }
  .ch.on .lamp { background: var(--amber); box-shadow: 0 0 8px var(--amber-dim); }
  .ch .n { color: var(--gray); }

  .trace-box { position: relative; padding: 6px 0 2px; }
  .trace-box svg { display: block; width: 100%; height: auto; }
  .baseline { stroke: var(--amber); stroke-width: 1.6; fill: none; }
  .ucl { stroke: var(--red); stroke-width: 1; stroke-dasharray: 7 5; opacity: .55; }
  .ucl-label { font-family: var(--mono); font-size: 9px; fill: var(--red); opacity: .8; letter-spacing: 1px; }
  .axis-tick { stroke: var(--rule); stroke-width: 1; }
  .axis-label { font-family: var(--mono); font-size: 10.5px; fill: var(--gray); letter-spacing: 1px; }
  .peak { stroke: var(--amber); stroke-width: 1.8; fill: rgba(255, 177, 0, .07);
    transform-box: fill-box; transform-origin: 50% 100%; transition: transform .45s cubic-bezier(.22,1,.36,1), opacity .45s; }
  .peak.flat { transform: scaleY(.02); opacity: .25; }
  .peak-num { font-family: var(--mono); font-size: 10px; fill: var(--gray); letter-spacing: 1px;
    transition: opacity .3s; }
  .peak-num.flat { opacity: .15; }
  .peak-hit { fill: transparent; cursor: pointer; }
  .acquire { fill: var(--amber); animation: acquire 3s ease-in-out infinite; }
  @keyframes acquire { 0%, 100% { opacity: 1; r: 3.5; } 50% { opacity: .25; r: 5.5; } }
  .crosshair { stroke: var(--red); stroke-width: 1; opacity: 0; transition: opacity .15s; pointer-events: none; }
  .tooltip { position: absolute; top: 8px; left: 0; transform: translateX(-50%); pointer-events: none;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase;
    background: #0e0f11; border: 1px solid var(--amber); color: var(--amber); padding: 6px 10px;
    white-space: nowrap; opacity: 0; transition: opacity .15s; z-index: 3; }

  /* trace load-in */
  .trace-live .baseline { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: drawTrace 1.4s ease-out forwards; }
  .trace-live .peak { transform: scaleY(.02); animation: elute .6s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes drawTrace { to { stroke-dashoffset: 0; } }
  @keyframes elute { to { transform: scaleY(1); } }

  /* ================= peak reports ================= */
  .reports { padding: 8px 0 40px; }
  .entry { border-bottom: 1px solid var(--rule); padding: 34px 0 40px; }
  .entry.off { display: none; }
  .readout { display: flex; flex-wrap: wrap; align-items: center; gap: 0; font-family: var(--mono);
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray); margin-bottom: 16px; }
  .readout > span { padding: 4px 14px; border-left: 1px solid var(--rule); }
  .readout > span:first-child { padding-left: 0; border-left: 0; color: var(--amber); font-weight: 600; }
  .readout .acq { color: var(--amber); }
  .entry-grid { display: grid; grid-template-columns: minmax(0, 7fr) minmax(0, 5fr); gap: 36px; align-items: start; }
  .entry-title { font-family: var(--display); font-weight: 700; font-size: clamp(30px, 4.4vw, 52px);
    line-height: .95; text-transform: uppercase; letter-spacing: .01em; }
  .entry-org { font-family: var(--mono); font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--gray); margin: 12px 0 16px; }
  .story { color: color-mix(in srgb, var(--white) 82%, transparent); font-size: 16px; white-space: pre-line; }
  .story.clamp { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .expand { margin-top: 8px; background: none; border: none; cursor: pointer; font-family: var(--mono);
    font-size: 11.5px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--amber); padding: 9px 0; }
  .expand:hover { text-decoration: underline; }
  .vlink { display: inline-block; font-family: var(--mono); font-size: 11.5px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--amber); margin-top: 8px; padding: 7px 0;
    text-decoration: none; border-bottom: 1px solid var(--amber-dim); }
  .vlink:hover { border-bottom-color: var(--amber); }

  /* photo scan beds */
  .sheet { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
  .sheet .cell { cursor: pointer; background: var(--bed); border: 1px solid var(--bed-line); padding: 8px; position: relative; }
  .sheet .cell:first-child { grid-column: span 2; }
  .sheet .frame { position: relative; overflow: hidden; }
  .sheet img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .sheet .cell:first-child .frame { aspect-ratio: 16/10; }
  .sheet .cell:not(:first-child) .frame { aspect-ratio: 4/3; }
  .sheet .cell:has(img.fit-contain) .frame { background: #F4F1E8; }
  .sheet img.fit-contain { object-fit: contain; }
  .sheet .cap { font-family: var(--mono); font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase;
    color: #6B6455; padding: 7px 2px 0; display: flex; justify-content: space-between; gap: 8px; }
  .sheet .cap .v { color: #8A2B16; }
  .more { position: absolute; inset: 8px; display: flex; align-items: center; justify-content: center;
    background: rgba(23, 25, 28, .55); font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--bed); }

  /* corner readout (graft) */
  .corner { position: fixed; right: 16px; bottom: 16px; z-index: 50; font-family: var(--mono);
    font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--amber);
    background: #0e0f11; border: 1px solid var(--rule); padding: 9px 13px; opacity: 0;
    transition: opacity .3s; pointer-events: none; }
  .corner.show { opacity: 1; }

  /* run complete + footer */
  .runout { border-top: 1px solid var(--rule); margin-top: 10px; padding: 26px 0; }
  .runout .line { font-family: var(--mono); font-size: 11.5px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--gray); display: flex; flex-wrap: wrap; gap: 8px 26px; }
  .runout .line b { color: var(--amber); font-weight: 600; }
  footer { border-top: 1px solid var(--rule); padding: 44px 0 56px; }
  .sig { font-family: var(--display); font-weight: 800; font-size: clamp(34px, 5vw, 54px);
    text-transform: uppercase; line-height: 1; }
  .foot-links { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 16px; }
  .foot-links a { font-family: var(--mono); font-size: 11.5px; letter-spacing: 1.5px; text-transform: uppercase;
    text-decoration: none; padding: 7px 0; }
  .foot-links a:hover { text-decoration: underline; }
  .foot-note { color: var(--gray); font-size: 12.5px; margin-top: 14px; font-family: var(--mono); }

  /* ================= lightbox ================= */
  .lightbox { position: fixed; inset: 0; z-index: 100; background: rgba(10, 11, 12, .95);
    display: none; align-items: center; justify-content: center; flex-direction: column; padding: 24px; }
  .lightbox.open { display: flex; }
  .lb-stage { position: relative; }
  .lightbox img { max-width: min(90vw, 1060px); max-height: 72vh; display: block; background: var(--bed); }
  .lb-bracket { position: absolute; width: 22px; height: 22px; border: 0 solid var(--amber); transition: all .25s ease-out; }
  .lb-bracket.tl { top: -8px; left: -8px; border-top-width: 2px; border-left-width: 2px; }
  .lb-bracket.tr { top: -8px; right: -8px; border-top-width: 2px; border-right-width: 2px; }
  .lb-bracket.bl { bottom: -8px; left: -8px; border-bottom-width: 2px; border-left-width: 2px; }
  .lb-bracket.br { bottom: -8px; right: -8px; border-bottom-width: 2px; border-right-width: 2px; }
  .lb-caption { font-family: var(--mono); font-size: 11.5px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--white); margin-top: 20px; text-align: center; max-width: 680px; }
  .lb-count { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--amber); margin-top: 6px; }
  .lb-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 46px; height: 46px;
    border: 1px solid var(--rule); background: #0e0f11; color: var(--white); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  .lb-btn:hover { border-color: var(--amber); color: var(--amber); }
  .lb-prev { left: 18px; } .lb-next { right: 18px; }
  .lb-close { position: absolute; top: 12px; right: 18px; background: none; border: none; font-size: 32px;
    color: var(--white); cursor: pointer; line-height: 1; }
  .lb-close:hover { color: var(--amber); }

  /* ================= responsive ================= */
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; gap: 8px; }
    .sample { order: -1; justify-self: start; padding: 16px; }
    .entry-grid { grid-template-columns: 1fr; gap: 22px; }
  }
  @media (max-width: 640px) {
    .wrap { padding: 0 16px; }
    .strip .id .id-x { display: none; }
    .hero { padding-top: 36px; }
    .trace-box { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .trace-box svg { min-width: 720px; }
    .readout { font-size: 10px; }
    .readout > span { padding: 3px 9px; }
    /* filmstrip photos */
    .sheet { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
      padding-bottom: 6px; }
    .sheet .cell { flex: 0 0 82%; scroll-snap-align: start; }
    .sheet .cell:first-child { grid-column: auto; }
    .sheet .cell .frame, .sheet .cell:first-child .frame { aspect-ratio: 4/3; }
    .sheet .cell:has(img.fit-contain) .frame { aspect-ratio: 4/3; }
    .corner { right: 10px; bottom: 10px; font-size: 10px; padding: 7px 10px; }
    .lb-btn { width: 40px; height: 40px; font-size: 17px; }
    .lb-prev { left: 6px; } .lb-next { right: 6px; }
    .lightbox { padding: 12px; }
    .lightbox img { max-width: calc(100vw - 40px); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01s !important; animation-delay: 0s !important; transition-duration: .01s !important; }
    .trace-live .baseline, .trace-live .peak { animation: none; stroke-dashoffset: 0; transform: none; }
    .acquire { animation: none; }
  }
</style>
</head>
<body>

<header class="strip">
  <div class="wrap">
    <span class="id"><b>DP</b><span class="id-x"> · RETENTION TIME · QUALITY RECORD</span></span>
    <nav>
      <a href="#reports">Peak reports</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="wrap hero-grid">
      <div>
        <h1 id="heroName">Divya <span class="accent">Patel</span></h1>
        <div class="role" id="pRole"></div>
        <p class="lede" id="pLede"></p>
        <div class="plates" id="pBadges"></div>
      </div>
      <figure class="sample">
        <span class="tick tl"></span><span class="tick tr"></span><span class="tick bl"></span><span class="tick br"></span>
        <div id="sampleImg"></div>
        <figcaption>Sample: D. Patel · Somerset, NJ</figcaption>
      </figure>
    </div>

    <!-- the career chromatogram -->
    <div class="chart">
      <div class="wrap">
        <div class="chart-head">
          <span class="t">Career signal · 2008 to 2026</span>
          <div class="channels" id="channels"></div>
        </div>
        <div class="trace-box" id="traceBox"></div>
      </div>
    </div>
  </section>

  <section class="reports" id="reports">
    <div class="wrap" id="feed"></div>
    <div class="wrap runout" id="runout"></div>
  </section>
</main>

<footer id="contact">
  <div class="wrap">
    <div class="sig" id="pName"></div>
    <div class="foot-links">
      <a href="https://www.linkedin.com/in/divya-patel-ms-asq-cqa-ssgb-57b9aa27/" target="_blank" rel="noopener">LinkedIn ↗</a>
      <a href="../index.html">Classic site</a>
      <a href="../v2/index.html">Batch record</a>
    </div>
    <p class="foot-note">© 2026 Divya Patel · Retention Time, third edition</p>
  </div>
</footer>

<div class="corner" id="corner"></div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="Close">×</button>
  <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous photo">‹</button>
  <div class="lb-stage">
    <span class="lb-bracket tl"></span><span class="lb-bracket tr"></span>
    <span class="lb-bracket bl"></span><span class="lb-bracket br"></span>
    <img id="lbImg" alt="" />
  </div>
  <div class="lb-caption" id="lbCaption"></div>
  <div class="lb-count" id="lbCount"></div>
  <button class="lb-btn lb-next" id="lbNext" aria-label="Next photo">›</button>
</div>

<script src="../content.js"></script>
<script>
function showContentError(err) {
  console.error(err);
  const d = document.createElement('div');
  d.style.cssText = 'max-width:620px;margin:80px auto;padding:26px 28px;background:#1D2024;border:1px solid #FFB100;font-family:system-ui,sans-serif;color:#EDEDE8;line-height:1.6;position:relative;z-index:5;';
  d.innerHTML = '<h2 style="margin:0 0 8px;font-size:20px;">The content file has a typo</h2>'
    + '<p>The site itself is fine. The last edit to <b>content.js</b> probably has a missing quote, comma, or backtick.</p>'
    + '<p style="margin-top:8px;">Open <b>content.js</b> on GitHub and correct the last change, or use History to restore the previous version. See <b>EDITING.md</b>.</p>'
    + '<p style="margin-top:10px;color:#9AA0A6;font-size:13px;">Detail: ' + (err && err.message ? String(err.message) : 'unknown') + '</p>';
  document.body.appendChild(d);
}
try {
if (typeof PROFILE === 'undefined' || typeof CATEGORIES === 'undefined' || typeof MOMENTS === 'undefined')
  throw new Error('content.js did not load or has a syntax error near the last edit');

const IMG = src => '../' + src;
const STATIC = location.search.includes('static');

/* ---------- date parsing: real dates position the peaks ---------- */
const MONTHS = { january:1, february:2, march:3, april:4, may:5, june:6, july:7, august:8, september:9, october:10, november:11, december:12 };
function parseDate(d) {
  const s = String(d || '').toLowerCase();
  const y = (s.match(/\d{4}/) || [null])[0];
  if (!y) return { t: 2015, rt: String(d || ''), ongoing: false };
  const mo = Object.keys(MONTHS).find(m => s.includes(m));
  const ongoing = s.includes('ongoing');
  const t = +y + (mo ? (MONTHS[mo] - .5) / 12 : .5);
  const rt = mo ? `RT ${y}.${String(MONTHS[mo]).padStart(2, '0')}` : `RT ${y}`;
  return { t, rt, ongoing };
}

/* ---------- hero ---------- */
document.getElementById('pName').textContent = PROFILE.name;
const roleParts = (PROFILE.role || '').split('·');
document.getElementById('pRole').innerHTML = `<b>${roleParts[0].trim()}</b>${roleParts[1] ? ' · ' + roleParts.slice(1).join('·').trim() : ''}`;
document.getElementById('pLede').textContent = PROFILE.lede;
document.getElementById('sampleImg').innerHTML = PROFILE.photo
  ? `<img src="${IMG(PROFILE.photo)}" alt="${PROFILE.name}" />` : `<div class="initials">DP</div>`;
const nm = PROFILE.name.split(' ');
document.getElementById('heroName').innerHTML = `${nm[0]} <span class="accent">${nm.slice(1).join(' ')}</span>`;

/* faceplate badges deep-link to the peak where the credential was earned */
const BADGE_TARGETS = { 'ASQ-CQA': 'CQA', 'Six Sigma Green Belt': 'Six Sigma', 'MS': "Master's", 'ASQ Member': 'CQA' };
document.getElementById('pBadges').innerHTML = PROFILE.badges.map(b =>
  `<button class="plate" data-find="${BADGE_TARGETS[b] || b}">${b}</button>`).join('');
document.getElementById('pBadges').addEventListener('click', e => {
  const p = e.target.closest('.plate');
  if (!p) return;
  const mi = MOMENTS.findIndex(m => (m.title || '').includes(p.dataset.find));
  const el = document.querySelector(`.entry[data-mi="${mi}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

/* ---------- data ---------- */
const peaks = MOMENTS.map((m, mi) => ({ m, mi, num: mi + 1, ...parseDate(m.date) }));
const CHIP_LABELS = { Award: 'Award', Certification: 'Cert', Project: 'Project', Milestone: 'Milestone', Education: 'Education' };
const CATS = CATEGORIES.filter(c => c !== 'All');
const onCats = new Set(CATS);

/* ---------- channel toggles with live counts ---------- */
const chBox = document.getElementById('channels');
chBox.innerHTML = CATS.map((c, i) => {
  const n = MOMENTS.filter(m => m.category === c).length;
  return `<button class="ch on" data-cat="${c}" aria-pressed="true">
    <span class="lamp"></span>CH${i + 1} ${CHIP_LABELS[c] || c} <span class="n">${String(n).padStart(2, '0')}</span></button>`;
}).join('');
chBox.addEventListener('click', e => {
  const b = e.target.closest('.ch');
  if (!b) return;
  const cat = b.dataset.cat;
  if (onCats.has(cat) && onCats.size === 1) { CATS.forEach(c => onCats.add(c)); }
  else if (onCats.has(cat)) onCats.delete(cat);
  else onCats.add(cat);
  applyChannels();
});

/* ---------- chromatogram ---------- */
const W = 1000, H = 190, BASE = 148, L = 34, R = 986;
const T0 = 2007.3, TSPLIT = 2020, T1 = 2027.2, SPLIT_AT = .32;
const x = t => t <= TSPLIT
  ? L + (t - T0) / (TSPLIT - T0) * SPLIT_AT * (R - L)
  : L + (SPLIT_AT + (t - TSPLIT) / (T1 - TSPLIT) * (1 - SPLIT_AT)) * (R - L);
function peakPath(px, h) {
  return `M ${px - 17} ${BASE} C ${px - 8} ${BASE} ${px - 6} ${BASE - h} ${px} ${BASE - h} C ${px + 6} ${BASE - h} ${px + 8} ${BASE} ${px + 17} ${BASE}`;
}
function buildTrace() {
  const ticks = [2008, 2012, 2016, 2020, 2024, 2026];
  let svg = `<svg viewBox="0 0 ${W} ${H}" aria-label="Career chromatogram: ${peaks.length} peaks from 2008 to 2026">`;
  svg += `<line class="ucl" x1="${L}" y1="24" x2="${R}" y2="24"/><text class="ucl-label" x="${R}" y="18" text-anchor="end">UCL</text>`;
  ticks.forEach(y => {
    svg += `<line class="axis-tick" x1="${x(y)}" y1="${BASE}" x2="${x(y)}" y2="${BASE + 7}"/>`;
    svg += `<text class="axis-label" x="${x(y)}" y="${BASE + 24}" text-anchor="middle">${y}</text>`;
  });
  svg += `<line class="baseline" x1="${L}" y1="${BASE}" x2="${R}" y2="${BASE}"/>`;
  peaks.forEach((p, i) => {
    const h = 52 + ((p.num * 29) % 48);
    const px = x(p.t);
    svg += `<path class="peak" data-mi="${p.mi}" data-cat="${p.m.category}" d="${peakPath(px, h)}" style="animation-delay:${.25 + i * .1}s"/>`;
    svg += `<text class="peak-num" data-mi="${p.mi}" x="${px}" y="${BASE - h - 10}" text-anchor="middle">${String(p.num).padStart(2, '0')}</text>`;
    if (p.ongoing) svg += `<circle class="acquire" cx="${px}" cy="${BASE - h - 22}" r="3.5"/>`;
    svg += `<circle class="peak-hit" data-mi="${p.mi}" cx="${px}" cy="${BASE - h / 2}" r="26"/>`;
  });
  svg += `<line class="crosshair" id="crosshair" x1="0" y1="26" x2="0" y2="${BASE}"/>`;
  svg += `</svg><div class="tooltip" id="tooltip"></div>`;
  const box = document.getElementById('traceBox');
  box.innerHTML = svg;
  if (!STATIC) box.classList.add('trace-live');

  const tip = document.getElementById('tooltip');
  const cross = document.getElementById('crosshair');
  box.addEventListener('pointermove', e => {
    const hit = e.target.closest('.peak-hit');
    if (!hit) { tip.style.opacity = 0; cross.style.opacity = 0; return; }
    const p = peaks.find(q => q.mi === +hit.dataset.mi);
    const rect = box.querySelector('svg').getBoundingClientRect();
    const sx = rect.left + (x(p.t) / W) * rect.width;
    tip.textContent = `Peak ${String(p.num).padStart(2, '0')} · ${p.rt} · ${p.m.category}`;
    tip.style.left = (sx - rect.left + box.scrollLeft) + 'px';
    tip.style.opacity = 1;
    cross.setAttribute('x1', x(p.t)); cross.setAttribute('x2', x(p.t));
    cross.style.opacity = .8;
  });
  box.addEventListener('pointerleave', () => { tip.style.opacity = 0; cross.style.opacity = 0; });
  box.addEventListener('click', e => {
    const hit = e.target.closest('.peak-hit');
    if (!hit) return;
    const el = document.querySelector(`.entry[data-mi="${hit.dataset.mi}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

/* ---------- peak reports ---------- */
const CLAMP_AT = 280;
function certCap(m, im) {
  return im.fit ? `<div class="cap"><span>${m.category} · ${(m.date || '').toUpperCase()}</span><span class="v">Verified original</span></div>`
                : `<div class="cap"><span>${(im.alt || '').slice(0, 46)}</span></div>`;
}
function sheetHTML(m, mi) {
  const imgs = m.images || [];
  if (!imgs.length) return '';
  const shown = imgs.slice(0, 3);
  const extra = imgs.length - shown.length;
  return `<div class="sheet" data-mi="${mi}">` + shown.map((im, i) => `
    <div class="cell" data-i="${i}">
      <div class="frame">
        <img src="${IMG(im.src)}" alt="${im.alt}" loading="lazy"${im.fit ? ` class="fit-${im.fit}"` : ''} />
        ${extra > 0 && i === shown.length - 1 ? `<div class="more">+${extra}</div>` : ''}
      </div>
      ${certCap(m, im)}
    </div>`).join('') + `</div>`;
}
function renderFeed() {
  document.getElementById('feed').innerHTML = peaks.map(p => {
    const m = p.m, story = m.story || '';
    return `
    <article class="entry" data-mi="${p.mi}" data-cat="${m.category || ''}">
      <div class="readout">
        <span class="pnum">PEAK ${String(p.num).padStart(2, '0')}/${String(peaks.length).padStart(2, '0')}</span>
        <span>${p.rt}</span>
        <span>CH ${m.category || 'Entry'}</span>
        ${p.ongoing ? '<span class="acq">● Acquiring</span>' : ''}
      </div>
      <div class="entry-grid">
        <div>
          <h2 class="entry-title">${m.title || 'Untitled entry'}</h2>
          <div class="entry-org">${m.org || ''}</div>
          <p class="story ${story.length > CLAMP_AT ? 'clamp' : ''}">${story}</p>
          ${story.length > CLAMP_AT ? '<button class="expand">Expand report ↓</button>' : ''}
          ${m.link ? `<br><a class="vlink" href="${m.link.url}" target="_blank" rel="noopener">${m.link.label} ↗</a>` : ''}
        </div>
        ${sheetHTML(m, p.mi)}
      </div>
    </article>`;
  }).join('');

  document.querySelectorAll('.expand').forEach(b => b.addEventListener('click', () => {
    const s = b.parentElement.querySelector('.story');
    const c = s.classList.toggle('clamp');
    b.textContent = c ? 'Expand report ↓' : 'Collapse report ↑';
  }));
  document.querySelectorAll('.sheet').forEach(g => g.addEventListener('click', e => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    openLightbox(+g.dataset.mi, +cell.dataset.i);
  }));
}

/* ---------- channel filtering: flatten peaks, hide reports, renumber ---------- */
function applyChannels() {
  document.querySelectorAll('.ch').forEach(b => {
    const on = onCats.has(b.dataset.cat);
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on);
  });
  document.querySelectorAll('.peak, .peak-num').forEach(el => {
    const p = peaks.find(q => q.mi === +el.dataset.mi);
    el.classList.toggle('flat', !onCats.has(p.m.category));
  });
  const visible = peaks.filter(p => onCats.has(p.m.category));
  let n = 0;
  document.querySelectorAll('.entry').forEach(el => {
    const on = onCats.has(el.dataset.cat);
    el.classList.toggle('off', !on);
    if (on) { n += 1; el.querySelector('.pnum').textContent = `PEAK ${String(n).padStart(2, '0')}/${String(visible.length).padStart(2, '0')}`; }
  });
  document.getElementById('runout').innerHTML =
    `<div class="line"><b>Run ${visible.length === peaks.length ? 'complete' : 'filtered'}</b>` +
    `<span>${visible.length} of ${peaks.length} peaks integrated</span><span>RT 2008 to 2026</span>` +
    `<span>Reviewed and released by D. Patel</span></div>`;
  wireCorner();
}

/* ---------- corner readout ---------- */
let cornerIO;
function wireCorner() {
  const corner = document.getElementById('corner');
  if (cornerIO) cornerIO.disconnect();
  cornerIO = new IntersectionObserver(es => es.forEach(e => {
    if (!e.isIntersecting) return;
    corner.textContent = e.target.querySelector('.pnum').textContent;
    corner.classList.add('show');
  }), { rootMargin: '-45% 0px -45% 0px' });
  document.querySelectorAll('.entry:not(.off)').forEach(el => cornerIO.observe(el));
}
window.addEventListener('scroll', () => {
  if (window.scrollY < 300) document.getElementById('corner').classList.remove('show');
}, { passive: true });

/* ---------- lightbox ---------- */
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
let lbImgs = [], lbIdx = 0;
function openLightbox(mi, i) {
  lbImgs = MOMENTS[mi].images || [];
  lbIdx = i;
  showLb();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function showLb() {
  const im = lbImgs[lbIdx];
  lbImg.src = IMG(im.src);
  lbImg.alt = im.alt;
  document.getElementById('lbCaption').textContent = im.alt;
  document.getElementById('lbCount').textContent = `${lbIdx + 1} / ${lbImgs.length}`;
}
function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
function stepLb(d) { lbIdx = (lbIdx + d + lbImgs.length) % lbImgs.length; showLb(); }
document.getElementById('lbClose').addEventListener('click', closeLb);
document.getElementById('lbPrev').addEventListener('click', () => stepLb(-1));
document.getElementById('lbNext').addEventListener('click', () => stepLb(1));
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') stepLb(-1);
  if (e.key === 'ArrowRight') stepLb(1);
});

buildTrace();
renderFeed();
applyChannels();
} catch (err) { showContentError(err); }
</script>
</body>
</html>
